<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" href="./favicon.ico" type="image/x-icon">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Devil - 选择版本</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  overflow:hidden;
  background:#0a0404;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  color:#f5e6d3;
  -webkit-font-smoothing:antialiased;
}

body{
  display:-webkit-flex;
  display:flex;
  -webkit-align-items:center;
  align-items:center;
  -webkit-justify-content:center;
  justify-content:center;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%,rgba(109,17,2,0.35) 0%,transparent 70%),
    radial-gradient(ellipse 60% 40% at 20% 80%,rgba(179,36,24,0.15) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%,rgba(179,36,24,0.15) 0%,transparent 60%);
  pointer-events:none;
  z-index:0;
}

body::after{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:0;
  opacity:.5;
}

.grid-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background-image:
    linear-gradient(rgba(211,79,43,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(211,79,43,0.03) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
  z-index:0;
}

.floating-ember{
  position:fixed;
  width:3px;
  height:3px;
  border-radius:50%;
  background:#e84a1f;
  box-shadow:0 0 6px 2px rgba(232,74,31,0.4);
  pointer-events:none;
  z-index:0;
  -webkit-animation:emberFloat linear infinite;
  animation:emberFloat linear infinite;
  opacity:0;
}

@-webkit-keyframes emberFloat{
  0%{-webkit-transform:translateY(100vh) scale(0);transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:.8}
  90%{opacity:.3}
  100%{-webkit-transform:translateY(-10vh) scale(1);transform:translateY(-10vh) scale(1);opacity:0}
}
@keyframes emberFloat{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:.8}
  90%{opacity:.3}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

.container{
  position:relative;
  z-index:1;
  display:-webkit-flex;
  display:flex;
  -webkit-flex-direction:column;
  flex-direction:column;
  -webkit-align-items:center;
  align-items:center;
  padding:40px 24px;
  max-width:900px;
  width:100%;
}

.container > .header{margin-bottom:48px}

.header{
  text-align:center;
  opacity:0;
  -webkit-animation:fadeSlideUp .8s ease forwards;
  animation:fadeSlideUp .8s ease forwards;
}

.title{
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  font-size:42px;
  letter-spacing:8px;
  color:#e84a1f;
  text-shadow:
    0 0 20px rgba(232,74,31,0.4),
    0 0 40px rgba(232,74,31,0.2),
    0 4px 0 #3d0900,
    0 6px 0 #2a0600,
    0 8px 12px rgba(0,0,0,.6);
  line-height:1.4;
  margin-bottom:16px;
  -webkit-animation:titlePulse 3s ease-in-out infinite;
  animation:titlePulse 3s ease-in-out infinite;
}

@-webkit-keyframes titlePulse{
  0%,100%{-webkit-filter:brightness(1);filter:brightness(1)}
  50%{-webkit-filter:brightness(1.15);filter:brightness(1.15)}
}
@keyframes titlePulse{
  0%,100%{filter:brightness(1)}
  50%{filter:brightness(1.15)}
}

.subtitle{
  font-size:16px;
  color:#a89080;
  letter-spacing:6px;
  text-transform:uppercase;
  font-weight:400;
}

.divider{
  width:120px;
  height:2px;
  background:-webkit-linear-gradient(left,transparent,#b32418,transparent);
  background:linear-gradient(90deg,transparent,#b32418,transparent);
  margin:8px auto 0;
  border-radius:2px;
  box-shadow:0 0 8px rgba(232,74,31,0.4);
}

.cards-row{
  display:-webkit-flex;
  display:flex;
  -webkit-justify-content:center;
  justify-content:center;
  -webkit-align-items:stretch;
  align-items:stretch;
  -webkit-flex-wrap:wrap;
  flex-wrap:wrap;
  width:100%;
}

.cards-row > .card{margin-right:32px}
.cards-row > .card:last-child{margin-right:0}

.card{
  -webkit-flex:1;
  flex:1;
  min-width:300px;
  max-width:380px;
  background:rgba(26,6,6,0.85);
  border:1px solid rgba(211,79,43,0.5);
  border-radius:12px;
  padding:36px 28px;
  display:-webkit-flex;
  display:flex;
  -webkit-flex-direction:column;
  flex-direction:column;
  -webkit-align-items:center;
  align-items:center;
  margin-bottom:20px;
  text-align:center;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  -webkit-transition:-webkit-transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease,border-color .35s ease;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease,border-color .35s ease;
  opacity:0;
  -webkit-animation:fadeSlideUp .8s ease forwards;
  animation:fadeSlideUp .8s ease forwards;
  text-decoration:none;
  color:inherit;
}

.card:nth-child(1){-webkit-animation-delay:.15s;animation-delay:.15s}
.card:nth-child(2){-webkit-animation-delay:.3s;animation-delay:.3s}

.card::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:100%;
  height:100%;
  background:-webkit-linear-gradient(135deg,rgba(232,74,31,0.06) 0%,transparent 50%,rgba(232,74,31,0.06) 100%);
  background:linear-gradient(135deg,rgba(232,74,31,0.06) 0%,transparent 50%,rgba(232,74,31,0.06) 100%);
  opacity:0;
  -webkit-transition:opacity .4s ease;
  transition:opacity .4s ease;
}

.card:hover::before{opacity:1}

.card::after{
  content:'';
  position:absolute;
  top:1px;left:1px;right:1px;bottom:1px;
  border-radius:11px;
  background:rgba(26,6,6,0.85);
  z-index:0;
  pointer-events:none;
}

.card > *{position:relative;z-index:1}

.card:hover{
  -webkit-transform:translateY(-8px) scale(1.02);
  transform:translateY(-8px) scale(1.02);
  box-shadow:
    0 20px 50px rgba(0,0,0,.5),
    0 0 30px rgba(232,74,31,0.4),
    inset 0 1px 0 rgba(255,255,255,.05);
  border-color:#e84a1f;
}

.card:active{
  -webkit-transform:translateY(-4px) scale(.98);
  transform:translateY(-4px) scale(.98);
  -webkit-transition-duration:.1s;
  transition-duration:.1s;
}

.card-icon{
  width:72px;
  height:72px;
  border-radius:16px;
  display:-webkit-flex;
  display:flex;
  -webkit-align-items:center;
  align-items:center;
  -webkit-justify-content:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  padding:10px;
}

.card-icon.v1{
  background:-webkit-linear-gradient(135deg,#2a0a00 0%,#4a1508 100%);
  background:linear-gradient(135deg,#2a0a00 0%,#4a1508 100%);
  border:2px solid rgba(211,79,43,0.4);
  box-shadow:inset 0 2px 8px rgba(0,0,0,.4),0 0 16px rgba(211,79,43,0.15);
}

.card-icon.v112{
  background:-webkit-linear-gradient(135deg,#3d0a00 0%,#6d1808 100%);
  background:linear-gradient(135deg,#3d0a00 0%,#6d1808 100%);
  border:2px solid rgba(255,107,44,0.4);
  box-shadow:inset 0 2px 8px rgba(0,0,0,.4),0 0 16px rgba(255,107,44,0.2);
}

.card-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
  image-rendering:auto;
  border-radius:4px;
}

.card-version{
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  font-size:24px;
  font-weight:700;
  color:#e84a1f;
  letter-spacing:2px;
}

.card-desc{
  font-size:15px;
  line-height:1.7;
  color:#a89080;
  max-width:260px;
  margin-top:8px;
  margin-bottom:8px;
}

.card-tag{
  display:-webkit-inline-flex;
  display:inline-flex;
  -webkit-align-items:center;
  align-items:center;
  padding:4px 12px;
  border-radius:20px;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  font-size:12px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:8px;
}

.card-tag > *{margin-right:6px}
.card-tag > *:last-child{margin-right:0}

.tag-classic{
  background:rgba(109,17,2,0.5);
  color:#e84a1f;
  border:1px solid rgba(211,79,43,0.3);
}

.tag-enhanced{
  background:rgba(255,107,44,0.1);
  color:#ff6b2c;
  border:1px solid rgba(255,107,44,0.3);
}

.play-btn{
  margin-top:auto;
  padding:14px 32px;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  font-size:14px;
  font-weight:700;
  letter-spacing:2px;
  color:#f5e6d3;
  background:-webkit-linear-gradient(135deg,#6d1102 0%,#b32418 100%);
  background:linear-gradient(135deg,#6d1102 0%,#b32418 100%);
  border:2px solid #e84a1f;
  border-radius:8px;
  cursor:pointer;
  -webkit-transition:all .3s cubic-bezier(.34,1.56,.64,1);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:
    0 4px 12px rgba(0,0,0,.4),
    0 0 16px rgba(232,74,31,0.15),
    inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;
  overflow:hidden;
}

.play-btn::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;bottom:0;
  background:-webkit-linear-gradient(135deg,transparent 40%,rgba(255,255,255,.08) 50%,transparent 60%);
  background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.08) 50%,transparent 60%);
  -webkit-transform:translateX(-100%);
  transform:translateX(-100%);
  -webkit-transition:-webkit-transform .5s ease;
  transition:transform .5s ease;
}

.card:hover .play-btn::before{-webkit-transform:translateX(100%);transform:translateX(100%)}

.play-btn:hover{
  background:-webkit-linear-gradient(135deg,#b32418 0%,#e84a1f 100%);
  background:linear-gradient(135deg,#b32418 0%,#e84a1f 100%);
  box-shadow:
    0 6px 20px rgba(0,0,0,.5),
    0 0 30px rgba(232,74,31,0.4),
    inset 0 1px 0 rgba(255,255,255,.12);
  -webkit-transform:translateY(-2px);
  transform:translateY(-2px);
}

.play-btn:active{
  -webkit-transform:translateY(0) scale(.96);
  transform:translateY(0) scale(.96);
  box-shadow:
    0 2px 8px rgba(0,0,0,.4),
    0 0 12px rgba(232,74,31,0.2);
}

.footer{
  opacity:0;
  -webkit-animation:fadeSlideUp .8s ease .45s forwards;
  animation:fadeSlideUp .8s ease .45s forwards;
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei','Hiragino Sans GB',sans-serif;
  font-size:13px;
  color:#a89080;
  letter-spacing:2px;
  margin-top:36px;
}

@-webkit-keyframes fadeSlideUp{
  from{opacity:0;-webkit-transform:translateY(30px);transform:translateY(30px)}
  to{opacity:1;-webkit-transform:translateY(0);transform:translateY(0)}
}
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

@media(max-width:700px){
  .container{padding:32px 16px}
  .container > .header{margin-bottom:36px}
  .cards-row > .card{margin-right:0;margin-bottom:16px}
  .cards-row > .card:last-child{margin-bottom:0}
  .card{min-width:280px;max-width:340px;padding:28px 22px}
  .title{font-size:32px;letter-spacing:4px}
}
</style>
</head>
<body>
<div class="grid-overlay"></div>

<div class="container">
  <div class="header">
    <h1 class="title">LEVEL DEVIL</h1>
    <p class="subtitle">选择游戏版本</p>
    <div class="divider"></div>
  </div>

  <div class="cards-row">
    <a class="card" href="./1.1/index.html" tabindex="0">
      <div class="card-icon v1"><img src="./1.1/favicon.ico" alt="Level Devil 1.1"></div>
      <span class="card-version">1.1</span>
      <p class="card-desc">经典原版体验，Lime 引擎驱动，纯净的恶魔关卡挑战</p>
      <span class="card-tag tag-classic">&#9670; 经典版</span>
      <button class="play-btn" type="button">开始游戏</button>
    </a>

    <a class="card" href="./1.1.2/index.html" tabindex="0">
      <div class="card-icon v112"><img src="./1.1.2/favicon.ico" alt="Level Devil 1.1.2"></div>
      <span class="card-version">1.1.2</span>
      <p class="card-desc">增强更新版，WASM 性能优化，更流畅的游戏体验</p>
      <span class="card-tag tag-enhanced">&#9733; 增强版</span>
      <button class="play-btn" type="button">开始游戏</button>
    </a>
  </div>

  <p class="footer">&copy; Level Devil Game Selector</p>
</div>

<script>
(function(){
  for(var i=0;i<15;i++){
    var ember=document.createElement('div');
    ember.className='floating-ember';
    ember.style.left=Math.random()*100+'vw';
    ember.style.animationDuration=(Math.random()*8+6)+'s';
    ember.style.animationDelay=(Math.random()*10)+'s';
    ember.style.width=ember.style.height=(Math.random()*3+1.5)+'px';
    document.body.appendChild(ember);
  }

  var cards=document.querySelectorAll('.card');
  for(var j=0;j<cards.length;j++){
    (function(card){
      card.addEventListener('keydown',function(e){
        if(e.key==='Enter'||e.key===' '){
          e.preventDefault();
          window.location.href=card.href;
        }
      });
    })(cards[j]);
  }
})();
</script>
</body>
</html>
